name: Build libnametag
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r25c
      - name: Build Dobby
        run: |
          git clone --depth=1 https://github.com/jmpews/Dobby /tmp/Dobby
          cd /tmp/Dobby
          # Fix bug include path Cpu.h di versi terbaru
          find . -name "*.h" -o -name "*.cc" -o -name "*.cpp" | \
            xargs sed -i 's|"core/arch/Cpu.h"|"source/core/arch/Cpu.h"|g' 2>/dev/null || true
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-21 \
            -DPlugin.SymbolResolver=OFF \
            -DCMAKE_CXX_FLAGS="-I/tmp/Dobby/source -I/tmp/Dobby" \
            -DCMAKE_C_FLAGS="-I/tmp/Dobby/source -I/tmp/Dobby" \
            -G Ninja
          ninja -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/jni/dobby/lib/armeabi-v7a
          mkdir -p $GITHUB_WORKSPACE/jni/dobby/include
          cp libdobby.a $GITHUB_WORKSPACE/jni/dobby/lib/armeabi-v7a/
          cp /tmp/Dobby/include/dobby.h $GITHUB_WORKSPACE/jni/dobby/include/
      - name: ndk-build
        run: |
          ${{ steps.ndk.outputs.ndk-path }}/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./jni/Android.mk \
            NDK_APPLICATION_MK=./jni/Application.mk \
            -j$(nproc)
      - uses: actions/upload-artifact@v4
        with:
          name: libnametag-arm32
          path: libs/armeabi-v7a/libnametag.so
